{% extends 'fees/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm p-4">
            <h4 class="mb-3 text-primary">Create New Student Log</h4>
            <form method="POST" onsubmit="return validateForm();">
                {% csrf_token %}
                {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
                <button type="submit" class="btn btn-success w-100">Save System Entry</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
