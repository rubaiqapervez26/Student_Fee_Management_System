<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fee System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}"><i class="fa-solid fa-file-invoice-dollar text-warning me-2"></i>SmartFee</a>
            <div class="ms-auto">
                <a class="btn btn-warning btn-sm" href="{% url 'add_record' %}"><i class="fa-solid fa-plus me-1"></i> Add Record</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        function validateForm() {
            let name = document.getElementById('student_name').value.trim();
            let rollNo = document.getElementById('roll_no').value.trim();
            let amount = document.getElementById('amount').value;
            if (name === "" || rollNo === "") {
                alert("Student Name and Roll Number fields are mandatory!");
                return false;
            }
            if (amount < 0 || amount === "") {
                alert("Enter a non-negative valid numerical amount!");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
